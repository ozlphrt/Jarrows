name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - feature/battery-optimization-test
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build main site (master)
        run: npm run build

      # Checkout feature/battery-optimization-test for specialized battery test build
      - name: Checkout feature/battery-optimization-test
        uses: actions/checkout@v4
        with:
          ref: feature/battery-optimization-test
          path: battery-test-src
          clean: false

      - name: Install battery-test dependencies
        run: npm ci
        working-directory: battery-test-src

      - name: Build battery-test site
        run: npm run build
        working-directory: battery-test-src
        env:
          VITE_BASE_PATH: /Jarrows/battery-test/

      - name: Copy battery-test build into main dist/battery-test/
        run: |
          mkdir -p dist/battery-test
          cp -r battery-test-src/dist/. dist/battery-test/

      - name: Checkout feature/v2-improvements for preview build
        uses: actions/checkout@v4
        with:
          ref: feature/v2-improvements
          path: preview-src
          clean: false

      - name: Install preview dependencies
        run: npm ci
        working-directory: preview-src

      - name: Build preview site (feature/v2-improvements)
        run: npm run build
        working-directory: preview-src
        env:
          VITE_BASE_PATH: /Jarrows/preview/

      - name: Copy preview build into main dist/preview/
        run: |
          mkdir -p dist/preview
          cp -r preview-src/dist/. dist/preview/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
