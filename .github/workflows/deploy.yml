name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build main site (master)
        run: npm run build

      - name: Checkout feature/v2-improvements for preview build
        uses: actions/checkout@v4
        with:
          ref: feature/v2-improvements
          path: preview-src
          clean: false

      - name: Install preview dependencies
        run: npm ci
        working-directory: preview-src

      - name: Build preview site (feature/v2-improvements)
        run: npm run build
        working-directory: preview-src
        env:
          VITE_BASE_PATH: /Jarrows/preview/

      - name: Copy preview build into main dist/preview/
        run: cp -r preview-src/dist/. dist/preview/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
