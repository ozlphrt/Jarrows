<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Zoom Toggle Mockup</title>
    <style>
        body {
            background: #111;
            color: white;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            gap: 40px;
        }

        .settings-menu {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            gap: 12px;
        }

        .toggle-icon {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
        }

        .toggle-icon:hover {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
        }

        .toggle-icon.active {
            color: white;
            /* Active state is bright white */
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        .label {
            margin-top: 10px;
            font-size: 12px;
            opacity: 0.6;
            text-align: center;
        }
    </style>
</head>

<body>

    <div style="text-align: center;">
        <h2>Proposed Auto Zoom Icons</h2>
        <div class="settings-menu">

            <div style="display: flex; flex-direction: column; align-items: center;">
                <button class="toggle-icon active" title="Auto Zoom ON">
                    <!-- Video Camera Icon (ON) -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" style="width: 24px; height: 24px;">
                        <path d="M23 7l-7 5 7 5V7z" />
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                    </svg>
                </button>
                <div class="label">ON (Active)</div>
            </div>

            <div style="display: flex; flex-direction: column; align-items: center;">
                <button class="toggle-icon" title="Auto Zoom OFF">
                    <!-- Video Camera Off Icon (OFF) -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" style="width: 24px; height: 24px;">
                        <path
                            d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 7.16" />
                        <line x1="1" y1="1" x2="23" y2="23" />
                        <path d="M23 7l-7 5 7 5V7z" />
                    </svg>
                </button>
                <div class="label">OFF (Inactive)</div>
            </div>

            <div style="display: flex; flex-direction: column; align-items: center;">
                <button class="toggle-icon" title="Auto Zoom OFF Simple">
                    <!-- Video Camera Off Icon Simplified -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" style="width: 24px; height: 24px;">
                        <path d="M23 7l-7 5 7 5V7z" />
                        <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
                        <line x1="1" y1="1" x2="23" y2="23" style="stroke: currentColor; stroke-width: 2;" />
                    </svg>
                </button>
                <div class="label">OFF (Alt)</div>
            </div>

        </div>
    </div>

</body>

</html>
